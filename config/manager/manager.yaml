apiVersion: v1
kind: Namespace
metadata:
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: heartbeats-operator
    app.kubernetes.io/version: __APP_VERSION__
    app.kubernetes.io/managed-by: kustomize
  name: system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: heartbeats-operator
    app.kubernetes.io/version: __APP_VERSION__
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: heartbeats-operator
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: heartbeats-operator
        app.kubernetes.io/version: __APP_VERSION__
    spec:
      securityContext:
        # Explicitly set pod-level hardening required by the Restricted Pod Security Standard.
        # Do not rely on cluster-level defaults for non-root execution or seccomp.
        # For more details, see: https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - command:
        - /manager
        args:
          - --leader-elect
          - --health-probe-bind-address=:8081
        image: controller:latest
        name: manager
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
        resources:
          limits:
            ephemeral-storage: 64Mi
            memory: 128Mi
          requests:
            cpu: 10m
            ephemeral-storage: 64Mi
            memory: 128Mi
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
